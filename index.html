<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CD PLAYER</title>
</head>
<body>
  <div id="stage">
    <div class="bg" id="bg-a"></div>
    <div class="bg" id="bg-b"></div>
    <canvas class="field" id="field-jelly" width="2560" height="1440"></canvas>
    <canvas class="field" id="field-fish" width="2560" height="1440"></canvas>
    <div id="window">
      <div id="titlebar">
        <span id="window-title">&#8857; CD PLAYER</span>
        <span id="status"></span>
        <span id="tb-buttons">
          <span class="tb-btn">&#9472;</span>
          <span class="tb-btn">&#9633;</span>
          <span class="tb-btn">&#10005;</span>
        </span>
      </div>
      <div id="window-body">
        <div id="art-well">
          <img id="art-a" class="art" alt="" draggable="false" />
          <img id="art-b" class="art" alt="" draggable="false" />
          <canvas id="art-dither" width="704" height="704"></canvas>
        </div>
        <div id="panel">
          <div class="field-row">
            <span class="field-label">ARTIST:</span>
            <span class="field-box"><span id="artist-text">&#8212;</span><span class="field-arrow">&#9660;</span></span>
          </div>
          <div class="field-row">
            <span class="field-label">TRACK:</span>
            <span class="field-box"><span id="track-text">NO DISC</span><span class="field-arrow">&#9660;</span></span>
          </div>
          <div id="slider">
            <div id="slider-line"></div>
            <div id="slider-thumb"></div>
          </div>
          <div id="time-readout"></div>
          <pre id="visualizer"></pre>
          <div id="transport">
            <button class="t-btn" id="btn-prev" tabindex="-1" title="previous">&#9664;&#9664;</button>
            <button class="t-btn" id="btn-play" tabindex="-1" title="play/pause">&#9654;</button>
            <button class="t-btn" id="btn-next" tabindex="-1" title="next">&#9654;&#9654;</button>
            <button class="t-btn" id="btn-moon" tabindex="-1" title="dark mode">&#9790;</button>
            <button class="t-btn" id="btn-fish" tabindex="-1" title="fish scene">&#8776;</button>
            <button class="t-btn" id="btn-dither" tabindex="-1" title="dither art">&#9618;</button>
          </div>
        </div>
      </div>
    </div>
    <div id="auth-gate">
      <button id="auth-button">&#9654; CONNECT SPOTIFY</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
